<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0c0e13">
<title>Гараж</title>
<style>
  :root{
    --bg:#0c0e13; --bg-glow:#161a24; --card:#161a22; --card2:#1e2431;
    --line:#2a3140; --text:#eef1f6; --muted:#93a0b4; --accent:#5aa8ff; --on-accent:#04121f;
    --floor:#1a1f2b; --shadow:0 30px 60px -20px rgba(0,0,0,.7);
    --r:20px;
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme]){
      --bg:#eceff5; --bg-glow:#ffffff; --card:#ffffff; --card2:#f1f4f9;
      --line:#dde3ec; --text:#141922; --muted:#5c6779; --accent:#1f6fe0; --on-accent:#ffffff;
      --floor:#e2e7f0; --shadow:0 24px 50px -22px rgba(30,50,90,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#eceff5; --bg-glow:#ffffff; --card:#ffffff; --card2:#f1f4f9;
    --line:#dde3ec; --text:#141922; --muted:#5c6779; --accent:#1f6fe0; --on-accent:#ffffff;
    --floor:#e2e7f0; --shadow:0 24px 50px -22px rgba(30,50,90,.35);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; color:var(--text);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, var(--bg-glow), transparent 70%), var(--bg);
    min-height:100dvh;
  }
  header{ display:flex; align-items:center; gap:14px; padding:22px clamp(16px,4vw,40px) 8px; max-width:1100px; margin:0 auto; }
  .logo{ font-size:1.5rem; }
  h1{ font-size:clamp(1.4rem,1rem+2vw,2rem); margin:0; letter-spacing:-.02em; font-weight:750; }
  header .sub{ color:var(--muted); font-size:.85rem; margin-left:2px; }
  .theme-btn{ margin-left:auto; background:var(--card); color:var(--text); border:1px solid var(--line);
    width:44px; height:44px; border-radius:13px; font-size:18px; cursor:pointer; display:grid; place-items:center; }
  .theme-btn:hover{ border-color:var(--accent); }
  main{ max-width:1100px; margin:0 auto; padding:12px clamp(16px,4vw,40px) 60px; }
  .lead{ color:var(--muted); font-size:.95rem; margin:0 2px 22px; }

  .grid{ display:grid; gap:22px; grid-template-columns:1fr; }
  @media (min-width:720px){ .grid{ grid-template-columns:1fr 1fr; } }

  .car-card{ position:relative; background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line); border-radius:var(--r); overflow:hidden; box-shadow:var(--shadow);
    text-decoration:none; color:inherit; display:flex; flex-direction:column;
    transition:transform .25s cubic-bezier(.16,1,.3,1),border-color .25s; }
  .car-card:hover{ transform:translateY(-5px); border-color:color-mix(in oklab,var(--accent) 50%,var(--line)); }
  .stage{ position:relative; padding:22px 20px 6px; display:grid; place-items:center;
    background:radial-gradient(120% 90% at 50% 32%, color-mix(in oklab,var(--accent) 7%, transparent), transparent 70%); }
  .stage svg{ width:100%; height:auto; max-height:200px; filter:drop-shadow(0 20px 14px rgba(0,0,0,.45)); }
  .car-body{ padding:16px 22px 22px; }
  .car-name{ font-size:1.3rem; font-weight:700; letter-spacing:-.01em; display:flex; align-items:center; gap:10px; }
  .car-sub{ color:var(--muted); font-size:.85rem; margin-top:2px; }
  .vin{ display:inline-flex; align-items:center; gap:8px; margin-top:12px; font-family:ui-monospace,Menlo,monospace;
    font-size:.8rem; color:var(--accent); background:color-mix(in oklab,var(--accent) 10%, transparent);
    border:1px solid color-mix(in oklab,var(--accent) 25%, transparent); padding:7px 11px; border-radius:10px;
    cursor:pointer; user-select:none; }
  .stats{ display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
  .stat{ background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:8px 12px; min-width:74px; }
  .stat b{ display:block; font-size:1.15rem; font-variant-numeric:tabular-nums; }
  .stat span{ color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; }
  .open{ margin-top:18px; display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:var(--on-accent);
    font-weight:650; font-size:.95rem; padding:13px 18px; border-radius:13px; align-self:flex-start; }
  .badge-color{ width:13px; height:13px; border-radius:50%; border:2px solid rgba(255,255,255,.5); flex:none; }

  .add-card{ border:1.5px dashed var(--line); border-radius:var(--r); background:transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:34px 26px; color:var(--muted); min-height:230px; }
  .add-card .plus{ width:54px; height:54px; border-radius:50%; border:1.5px dashed var(--line); display:grid; place-items:center; font-size:26px; margin-bottom:14px; }
  .add-card b{ color:var(--text); font-weight:650; }
  .add-card p{ font-size:.82rem; margin:8px 0 0; max-width:34ch; }

  footer{ max-width:1100px; margin:0 auto; padding:8px clamp(16px,4vw,40px) 40px; color:var(--muted); font-size:.78rem; }
</style>
</head>
<body>
<header>
  <span class="logo">🅿️</span>
  <div>
    <h1>Гараж</h1>
    <div class="sub">оффлайн-справочники по VIN · каталог, схемы, ТО</div>
  </div>
  <button class="theme-btn" id="theme-btn" title="Тема" aria-label="Тема">◐</button>
</header>
<main>
  <p class="lead">Выбери машину — внутри каталог запчастей, взрыв-схемы EPC по VIN, диагностика и список для продавца. Всё работает офлайн.</p>
  <div class="grid" id="grid"></div>
</main>
<footer>Личный гараж · открывается на телефоне и ноутбуке · данные и отметки хранятся в браузере</footer>

<div id="toast" style="position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.4);"></div>

<script>
// ── SVG-иллюстрации (боковой профиль, перерисованы по фото) ──
function velosterSVG(){ return `<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hyundai Veloster, жёлтый">
  <defs>
    <linearGradient id="vB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe24a"/><stop offset=".5" stop-color="#f7c200"/><stop offset="1" stop-color="#d99a00"/></linearGradient>
    <linearGradient id="vG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#37485c"/><stop offset="1" stop-color="#141d27"/></linearGradient>
    <radialGradient id="vR" cx=".4" cy=".38" r=".64"><stop offset="0" stop-color="#eef2f7"/><stop offset=".55" stop-color="#98a2b0"/><stop offset="1" stop-color="#2c333d"/></radialGradient>
  </defs>
  <path d="M452,150 C458,142 458,134 456,127 C432,120 396,113 356,108 C334,96 314,84 292,79 C258,72 214,72 176,79 C150,84 128,90 112,97 C86,105 62,112 44,120 C41,128 41,138 43,146 C44,150 47,152 51,152 L440,152 C447,152 451,151 452,150 Z" fill="url(#vB)" stroke="#b98400" stroke-width="1.4"/>

  <path d="M300,100 C286,86 262,80 236,80 C204,80 168,86 140,98 L152,112 L288,112 C298,110 303,106 300,100 Z" fill="url(#vG)"/>
  <path d="M212,80 L212,112" stroke="#0c1119" stroke-width="4"/>
  <path d="M150,90 C195,82 245,80 288,84" fill="none" stroke="#fff7cf" stroke-width="2.4" stroke-linecap="round" opacity=".6"/>
  <path d="M66,132 C160,122 300,120 448,130" fill="none" stroke="#00000026" stroke-width="2.4"/>
  <path d="M42,113 C50,110 58,110 66,112 L64,118 L44,120 Z" fill="url(#vB)" stroke="#b98400" stroke-width="1"/>
  <path d="M440,124 C449,125 455,130 456,138 L438,136 Z" fill="#fff6d5"/>
  <path d="M432,141 L456,141 L455,148 L436,148 Z" fill="#0f151c"/>
  <path d="M42,122 C50,121 57,124 58,130 L58,138 L44,137 Z" fill="#e0402f"/>
  <path d="M92,153 a38,38 0 0 1 76,0 Z" fill="#0c0e13"/>
  <path d="M320,153 a38,38 0 0 1 76,0 Z" fill="#0c0e13"/>
  <g><circle cx="130" cy="151" r="37" fill="#11141a"/><circle cx="130" cy="151" r="20" fill="url(#vR)"/>
    <g stroke="#2a313c" stroke-width="3" stroke-linecap="round"><path d="M130,133 L130,169"/><path d="M112,151 L148,151"/><path d="M117,138 L143,164"/><path d="M143,138 L117,164"/><path d="M120,134 L140,168"/><path d="M140,134 L120,168"/></g>
    <circle cx="130" cy="151" r="5" fill="#1b212a"/></g>
  <g><circle cx="358" cy="151" r="37" fill="#11141a"/><circle cx="358" cy="151" r="20" fill="url(#vR)"/>
    <g stroke="#2a313c" stroke-width="3" stroke-linecap="round"><path d="M358,133 L358,169"/><path d="M340,151 L376,151"/><path d="M345,138 L371,164"/><path d="M371,138 L345,164"/><path d="M348,134 L368,168"/><path d="M368,134 L348,168"/></g>
    <circle cx="358" cy="151" r="5" fill="#1b212a"/></g>
</svg>`; }

function audiSVG(){ return `<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Audi A6, чёрная">
  <defs>
    <linearGradient id="aB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#464c55"/><stop offset=".45" stop-color="#1d2126"/><stop offset="1" stop-color="#0b0c0f"/></linearGradient>
    <linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#465464"/><stop offset="1" stop-color="#1b222a"/></linearGradient>
    <radialGradient id="aR" cx=".4" cy=".38" r=".64"><stop offset="0" stop-color="#eef2f7"/><stop offset=".55" stop-color="#9aa4b2"/><stop offset="1" stop-color="#39404b"/></radialGradient>
  </defs>
  <path d="M462,152 C470,144 470,132 464,122 C440,114 404,108 360,104 L344,102 C324,88 302,78 276,76 C244,73 210,74 184,80 C170,83 160,87 150,91 C132,98 112,102 96,104 L58,106 C50,107 45,112 43,122 C41,133 41,143 45,150 C47,153 51,152 55,152 L456,152 C459,152 461,152 462,152 Z" fill="url(#aB)" stroke="#000" stroke-width="1.1"/>
  <path d="M60,150 L452,150 C455,150 457,149 458,147 L64,147 C58,148 57,150 60,150 Z" fill="#05070a" opacity=".5"/>
  <path d="M150,91 C160,85 174,80 190,79 L272,81 C300,83 322,90 338,101 L157,101 C151,100 148,95 150,91 Z" fill="url(#aG)"/>
  <path d="M157,100 L338,100" stroke="#cdd2d9" stroke-width="1.8" opacity=".7"/>
  <path d="M206,80 L206,101 M264,82 L264,101" stroke="#0c0f14" stroke-width="3.6"/>
  <path d="M52,124 C180,116 340,116 466,126" fill="none" stroke="#ffffff1c" stroke-width="1.6"/>
  <path d="M58,133 C190,127 340,127 460,135" fill="none" stroke="#00000045" stroke-width="2"/>
  <path d="M466,120 L472,122 L474,146 L466,146 Z" fill="#1d232b"/>
  <path d="M452,120 C462,121 468,126 470,134 L452,131 Z" fill="#eaf3ff"/>
  <path d="M456,124 l8,1" stroke="#a9d6ff" stroke-width="1.4"/>
  <path d="M38,124 C48,123 56,126 58,132 L58,140 L40,139 Z" fill="#cc2a1e"/>
  <path d="M84,150 a38,38 0 0 1 76,0 Z" fill="#0c0e13"/>
  <path d="M330,150 a38,38 0 0 1 76,0 Z" fill="#0c0e13"/>
  <g><circle cx="122" cy="148" r="37" fill="#0e1116"/><circle cx="122" cy="148" r="20" fill="url(#aR)"/>
    <g stroke="#38404a" stroke-width="2.4" stroke-linecap="round"><path d="M122,129 L122,167"/><path d="M103,148 L141,148"/><path d="M108,135 L136,161"/><path d="M136,135 L108,161"/><path d="M112,131 L132,165"/><path d="M132,131 L112,165"/><path d="M105,140 L139,156"/><path d="M139,140 L105,156"/></g>
    <circle cx="122" cy="148" r="5" fill="#1b212a"/></g>
  <g><circle cx="368" cy="148" r="37" fill="#0e1116"/><circle cx="368" cy="148" r="20" fill="url(#aR)"/>
    <g stroke="#38404a" stroke-width="2.4" stroke-linecap="round"><path d="M368,129 L368,167"/><path d="M349,148 L387,148"/><path d="M354,135 L382,161"/><path d="M382,135 L354,161"/><path d="M358,131 L378,165"/><path d="M378,131 L358,165"/><path d="M351,140 L385,156"/><path d="M385,140 L351,156"/></g>
    <circle cx="368" cy="148" r="5" fill="#1b212a"/></g>
</svg>`; }

// ── данные гаража ──
const CARS=[
  { name:"Hyundai Veloster", sub:"1.6 T-GDI · 2014 · G4FJ", vin:"KMHTE61EBEU187351",
    color:"#f7c400", href:"veloster.html", svg:velosterSVG,
    stats:[["180","деталей"],["177","узлов EPC"],["2590","OEM"]] },
  { name:"Audi A6 / Avant", sub:"C6 рестайл · оригинал по VIN", vin:"WAUZZZ4F3AN034547",
    color:"#15171b", href:"audi.html", svg:audiSVG,
    stats:[["110","узлов EPC"],["1898","OEM"]] },
];

const $=s=>document.querySelector(s);
function toast(m){ const t=$('#toast'); t.textContent=m; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; },1600); }
function copy(text){ if(navigator.clipboard&&window.isSecureContext){ navigator.clipboard.writeText(text).then(()=>toast('VIN скопирован')); return; }
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.top='-999px'; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('VIN скопирован'); }catch(e){ toast('Не удалось'); } document.body.removeChild(ta); }

function render(){
  const g=$('#grid');
  g.innerHTML = CARS.map(c=>`
    <a class="car-card" href="${c.href}">
      <div class="stage">${c.svg()}</div>
      <div class="car-body">
        <div class="car-name"><span class="badge-color" style="background:${c.color}"></span>${c.name}</div>
        <div class="car-sub">${c.sub}</div>
        <span class="vin" data-vin="${c.vin}" title="Скопировать VIN">${c.vin} ⧉</span>
        <div class="stats">${c.stats.map(s=>`<div class="stat"><b>${s[0]}</b><span>${s[1]}</span></div>`).join('')}</div>
        <span class="open">Открыть справочник →</span>
      </div>
    </a>`).join('') + `
    <div class="add-card">
      <div class="plus">＋</div>
      <b>Добавить машину</b>
      <p>Даёшь VIN — подбирается силуэт модели и рисуется в её цвете. Дальше подтягиваются схемы EPC по VIN.</p>
    </div>`;
  g.addEventListener('click', e=>{ const vin=e.target.closest('.vin'); if(vin){ e.preventDefault(); copy(vin.dataset.vin); } });
}

const TK='cars_theme', ICON={auto:'◐',light:'☀',dark:'☾'};
function applyTheme(t){ const m=document.querySelector('meta[name=theme-color]');
  if(t==='light'||t==='dark') document.documentElement.dataset.theme=t; else delete document.documentElement.dataset.theme;
  const light = t==='light' || (t==='auto' && matchMedia('(prefers-color-scheme: light)').matches);
  if(m) m.setAttribute('content', light?'#eceff5':'#0c0e13'); }
function cur(){ return localStorage.getItem(TK)||'auto'; }
function initTheme(){ applyTheme(cur()); $('#theme-btn').textContent=ICON[cur()];
  $('#theme-btn').addEventListener('click',()=>{ const o=['auto','light','dark']; const n=o[(o.indexOf(cur())+1)%3];
    localStorage.setItem(TK,n); applyTheme(n); $('#theme-btn').textContent=ICON[n]; }); }

render(); initTheme();
</script>
</body>
</html>
